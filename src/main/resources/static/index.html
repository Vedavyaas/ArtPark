<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Adaptive Onboarding Engine</title>
    <meta name="description" content="Upload your resume and the target JD to generate a personalized training roadmap.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-anim"></div>
    <div class="glass-orb orb-top-right"></div>
    <div class="glass-orb orb-bottom-left"></div>

    <main class="dashboard-container roadmap-container">
        <section class="glass-card upload-section">
            <header class="card-header">
                <div class="icon-container">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-cloud-lightning"><path d="M19 16.9A5 5 0 0 0 18 7h-1.26a8 8 0 1 0-11.62 9"></path><polyline points="13 11 9 17 15 17 11 23"></polyline></svg>
                </div>
                <h1>Adaptive Onboarding Engine</h1>
                <p>Upload your Resume and the target Job Description to generate your personalized learning pathway.</p>
            </header>

            <form id="ingest-form" class="dynamic-form">
                
                <div class="input-group file-upload-group">
                    <label for="file-resume">Resume (PDF)</label>
                    <div class="drop-area" id="drop-area-resume">
                        <div class="drop-content">
                            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                            <span class="drop-title">Drag & Drop Resume Here</span>
                            <span class="drop-subtitle">or <b class="browse-link">Browse Files</b></span>
                        </div>
                        <input type="file" id="file-resume" name="file-resume" accept=".pdf,.doc,.docx" required hidden>
                    </div>
                    <div class="file-info" id="file-info-resume" style="display: none;">
                        <span class="file-name" id="file-name-resume"></span>
                        <svg id="remove-file-resume" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="remove-icon"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </div>
                </div>

                <div class="input-group file-upload-group">
                    <label for="file-jd">Job Description (PDF)</label>
                    <div class="drop-area" id="drop-area-jd">
                        <div class="drop-content">
                            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                            <span class="drop-title">Drag & Drop JD Here</span>
                            <span class="drop-subtitle">or <b class="browse-link">Browse Files</b></span>
                        </div>
                        <input type="file" id="file-jd" name="file-jd" accept=".pdf,.doc,.docx" required hidden>
                    </div>
                    <div class="file-info" id="file-info-jd" style="display: none;">
                        <span class="file-name" id="file-name-jd"></span>
                        <svg id="remove-file-jd" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="remove-icon"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="submit-btn">
                    <span class="btn-text">Generate Roadmap</span>
                    <span class="btn-loader"></span>
                </button>
                
                <div class="feedback-message" id="feedback-message" style="display: none;"></div>
            </form>

            <div id="metrics-dashboard" class="metrics-grid" style="display: none;">
                <div class="metric-card">
                    <div class="metric-label">Profile Match</div>
                    <div class="metric-value" id="metric-match">0%</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Missing Skills</div>
                    <div class="metric-value" id="metric-missing">0</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Modules Req.</div>
                    <div class="metric-value" id="metric-courses">0</div>
                </div>
            </div>

            <div class="roadmap-timeline timeline-container" id="roadmap-timeline" style="margin-top: 40px;">
                <!-- Timeline items injected here via JS -->
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
