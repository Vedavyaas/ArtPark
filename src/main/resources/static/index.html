<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Ingestion Portal</title>
    <meta name="description" content="Upload your resume to our ingestion portal.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-anim"></div>
    <div class="glass-orb orb-top-right"></div>
    <div class="glass-orb orb-bottom-left"></div>

    <main class="dashboard-container">
        <section class="glass-card upload-section">
            <header class="card-header">
                <div class="icon-container">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-cloud-lightning"><path d="M19 16.9A5 5 0 0 0 18 7h-1.26a8 8 0 1 0-11.62 9"></path><polyline points="13 11 9 17 15 17 11 23"></polyline></svg>
                </div>
                <h1>Intelligence Ingestion Node</h1>
                <p>Upload your candidate profile into the talent sub-system</p>
            </header>

            <form id="ingest-form" class="dynamic-form">
                <div class="input-group">
                    <label for="name">Candidate Name</label>
                    <div class="input-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="input-icon"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                        <input type="text" id="name" name="name" placeholder="E.g. Alan Turing" required autocomplete="off">
                    </div>
                </div>

                <div class="input-group file-upload-group">
                    <label for="file">Document (PDF/DOCX)</label>
                    <div class="drop-area" id="drop-area">
                        <div class="drop-content">
                            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                            <span class="drop-title">Drag & Drop Resume Here</span>
                            <span class="drop-subtitle">or <b class="browse-link">Browse Files</b></span>
                        </div>
                        <input type="file" id="file" name="file" accept=".pdf,.doc,.docx" required hidden>
                    </div>
                    <div class="file-info" id="file-info">
                        <span class="file-name" id="file-name"></span>
                        <svg id="remove-file" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="remove-icon"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="submit-btn">
                    <span class="btn-text">Initiate Ingestion</span>
                    <span class="btn-loader"></span>
                </button>
                
                <div class="feedback-message" id="feedback-message"></div>
            </form>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
